<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在唤起钉钉 · {{ instance_name }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f7fb;
            color: #111827;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
            padding: 28px;
        }
        h1 { margin: 0 0 10px; font-size: 24px; }
        p { color: #4b5563; line-height: 1.6; }
        .btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 12px;
            border: 1px solid #d1d5db;
            color: #111827;
            background: #fff;
        }
        .btn-primary {
            background: #0089ff;
            border-color: #0089ff;
            color: white;
        }
        .hint {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f3f4f6;
            font-size: 14px;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>正在尝试唤起钉钉 App</h1>
        <p>你正在访问 {{ instance_name }} 上的受控页面。如果手机支持，将优先拉起钉钉 App 完成授权。没反应的话，下面也保留了网页版继续入口。</p>
        <a href="{{ dingtalk_app_url }}" class="btn btn-primary" id="open-dingtalk">打开钉钉 App</a>
        <a href="{{ auth_url }}" class="btn">继续网页版授权</a>
        <div class="hint">如果你已经在钉钉里打开当前页面，直接继续网页版授权通常就够了。授权完成后会回到 {{ instance_name }}。</div>
    </div>
    <script>
        (function () {
            var appUrl = {{ dingtalk_app_url | tojson }};
            var webUrl = {{ auth_url | tojson }};
            var fallbackTriggered = false;

            function openApp() {
                window.location.href = appUrl;
                setTimeout(function () {
                    if (!fallbackTriggered) {
                        fallbackTriggered = true;
                        window.location.href = webUrl;
                    }
                }, 1400);
            }

            window.addEventListener('load', function () {
                setTimeout(openApp, 120);
            });
        })();
    </script>
</body>
</html>
