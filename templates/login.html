<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — {{ page.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .card .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .card h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            background: #fff;
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            text-decoration: none;
            margin-bottom: 12px;
            transition: background 0.15s, border-color 0.15s;
            cursor: pointer;
        }
        .btn:hover {
            background: #f5f5f5;
            border-color: #d0d0d0;
        }
        .btn-dingtalk { color: #0089ff; }
        .btn-wechat { color: #07c160; }
        .divider {
            color: #ccc;
            font-size: 13px;
            margin: 20px 0;
        }
        .note {
            font-size: 12px;
            color: #999;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128274;</div>
        <h1>{{ page.title }}</h1>
        <p>此页面需要登录后才能查看，请选择登录方式</p>

        {% if has_dingtalk %}
        <a href="{{ base_url }}/auth/dingtalk?redirect={{ slug }}" class="btn btn-dingtalk">
            钉钉登录
        </a>
        {% endif %}

        {% if has_wechat %}
        <a href="{{ base_url }}/auth/wechat?redirect={{ slug }}" class="btn btn-wechat">
            微信登录
        </a>
        {% endif %}

        {% if not has_dingtalk and not has_wechat %}
        <p style="color: #e74c3c;">暂未配置任何登录方式，请联系管理员</p>
        {% endif %}

        <div class="note">
            登录后将自动提交访问申请，审批通过后即可查看
        </div>
    </div>
</body>
</html>
