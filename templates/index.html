<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageGate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        header {
            margin-bottom: 48px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        header p {
            color: #666;
            margin-top: 8px;
            font-size: 15px;
        }
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .page-card {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px 24px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .page-card:hover {
            border-color: #d0d0d0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .page-card h2 {
            font-size: 17px;
            font-weight: 600;
        }
        .page-card .meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 13px;
            color: #888;
        }
        .page-card .desc {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }
        .tag {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 80px 0;
            font-size: 15px;
        }
        footer {
            margin-top: 60px;
            text-align: center;
            font-size: 13px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PageGate</h1>
            <p>AI 生成的页面合集</p>
        </header>

        <div class="page-list">
            {% if pages %}
                {% for page in pages %}
                <a href="{{ base_url }}/{{ page.slug }}" class="page-card">
                    <h2>{{ page.title }}</h2>
                    <div class="meta">
                        <span class="tag">{{ page.category }}</span>
                        <span>{{ page.created_at[:10] if page.created_at else '' }}</span>
                    </div>
                    {% if page.description %}
                    <div class="desc">{{ page.description }}</div>
                    {% endif %}
                </a>
                {% endfor %}
            {% else %}
                <div class="empty">
                    <p>还没有公开页面</p>
                </div>
            {% endif %}
        </div>

        <footer>
            Powered by PageGate
        </footer>
    </div>
</body>
</html>
